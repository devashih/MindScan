name: Deploy MindScan

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t mindscan .

    - name: Save Docker Image
      run: docker save mindscan > mindscan.tar

    - name: Copy Image to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "mindscan.tar"
        target: "/home/ubuntu"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop mindscan || true
          docker rm mindscan || true
          docker load < mindscan.tar
          docker run -d -p 5000:5000 --name mindscan mindscan
